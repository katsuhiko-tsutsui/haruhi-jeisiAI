<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HARUHI ver.1.20</title>

    <!-- Bootstrap -->
    <link 
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    >

    <!-- HARUHI UI全体スタイル -->
    <link rel="stylesheet" href="/static/css/haruhi_ui.css">
    <style>
    .navigator-message {
        display: flex;
        justify-content: flex-start;
        margin: 12px 0;
    }
    .navigator-card {
        background: linear-gradient(135deg, #f0f7ff, #e8f4e8);
        border-left: 4px solid #4a9b6f;
        border-radius: 8px;
        padding: 16px 20px;
        max-width: 85%;
        font-size: 0.95rem;
        line-height: 1.7;
        color: #2c3e50;
        white-space: pre-wrap;
    }
    </style>
</head>

<body>

<div class="haruhi-layout">

    <!-- 左：セッション一覧 -->
    <div class="session-panel">
        {% include "_chat_sessions.html" %}
    </div>

    <!-- 右：HARUHI本体 -->
    <div class="chat-panel">

        <!-- HARUHI タイトル -->
        <div class="haruhi-title-box">
            <div class="haruhi-title">教育思考支援AI | HARUHI ver.1.31</div>
            <div class="haruhi-subtitle">Human-Augmented Reflective Understanding for Holistic Intelligence</div>
        </div>

        <!-- 思考モード -->
        <!-- 変更後 -->
        <div class="mode-select-area">
            <button id="navigator-btn" class="btn btn-outline-success btn-sm" title="思考を振り返る">
                🧭 思考を振り返る
            </button>
        </div>

        <!-- チャットコンテンツ -->
        <div class="chat-content-area">
            {% include "_chat_content.html" %}
        </div>

        <!-- 入力エリア（固定） -->
        <div class="input-area">
            <textarea id="user-input" class="form-control" placeholder="HARUHIに質問する..." rows="2"></textarea>
            <button id="send-button" class="btn btn-primary send-btn">➤</button>
        </div>

    </div>
</div>

{% include "faq_popup.html" %}
{% include "pdg_popup.html" %}
<!-- JS -->
<script src="/static/js/chat_handler.js"></script>
<script src="/static/js/faq_popup.js"></script>

<!-- CSS -->
<link rel="stylesheet" href="/static/css/faq_popup.css">

<!-- PDGツリー -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="/static/js/pdg_tree.js"></script>
<script>
    // ★URLのtokenをsessionStorageに保存
    const urlParams = new URLSearchParams(window.location.search);
    const tokenFromUrl = urlParams.get("token");
    if (tokenFromUrl) {
        sessionStorage.setItem("haruhi_access_token", tokenFromUrl);
    }

    // sessionStorageからuser_idを取得（ログイン済みのUUID）
    const currentUserId = sessionStorage.getItem("haruhi_user_id") || "guest_user";
    loadPDGTree(currentUserId);
</script>

</body>
</html>
